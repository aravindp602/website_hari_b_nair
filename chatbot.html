<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Session</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
</head>
<body class="chat-page-body">

    <header class="main-header">
        <div class="container">
            <a href="index.html" class="logo">Agentic Collective</a>
            <div class="header-controls">
                <nav>
                    <a href="index.html">Explore</a>
                    <a href="dashboard.html">Dashboard</a>
                </nav>
                <button class="theme-toggle" id="theme-toggle" title="Toggle theme" aria-label="Toggle theme">
                    <span class="sun-icon">☀️</span>
                    <span class="moon-icon">🌙</span>
                </button>
            </div>
        </div>
    </header>

    <div class="chat-layout-grid">
        <aside id="chat-history-panel" class="chat-history-panel">
            <div class="history-header">
                <h3>History</h3>
                <a href="chatbot.html" id="new-chat-btn" class="new-chat-btn" title="Start a new chat">+ New Chat</a>
            </div>
            <div id="history-list" class="history-list">
                <!-- Chat history items will be injected here -->
            </div>
        </aside>

        <main class="chat-main-content">
            <div id="chat-header-controls" class="chat-header-controls">
                <h1 id="chat-title" class="chat-title" contenteditable="false">New Conversation</h1>
                <div class="conversation-actions">
                    <button id="rename-chat-btn" title="Rename Conversation">Rename</button>
                    <button id="delete-chat-btn" title="Delete Conversation">Delete</button>
                </div>
            </div>

            <div id="chat-window" class="chat-window">
                <!-- Messages will appear here -->
            </div>

            <div id="welcome-mat" class="welcome-mat">
                <!-- Welcome mat will be populated here -->
            </div>
            
            <div class="chat-input-container">
                 <div id="suggestion-chips" class="suggestion-chips"></div>
                <div class="chat-input-area">
                    <input type="text" id="userInput" placeholder="Type your message..." autocomplete="off" disabled>
                    <button id="sendMessageBtn" title="Send Message" aria-label="Send Message" disabled>
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13"/><path d="M22 2L15 22L11 13L2 9L22 2Z"/></svg>
                    </button>
                </div>
            </div>
        </main>
    </div>
    
    <script>
        const chatbotData = [ { id: 1, name: 'Brand Identity Architect', category: 'Creativity', icon: 'img/edit-3.svg', description: 'Generates cohesive brand names, logos, and mission statements.', examples: ['"Suggest names for a sustainable coffee shop"', '"Create a mission statement for a tech startup"'] }, { id: 2, name: 'Code Refactor Engine', category: 'Technical', icon: 'img/code.svg', description: 'Analyzes and refactors code for optimal performance and readability.', examples: ['"Refactor this Python function for efficiency"', '"Check my JavaScript for common errors"'] }, { id: 3, name: 'Market Trend Forecaster', category: 'Business', icon: 'img/cpu.svg', description: 'Predicts market shifts by analyzing vast datasets and news.', examples: ['"What are the upcoming trends in renewable energy?"', '"Analyze the sentiment for stock XYZ"'] }, { id: 4, name: 'Creative Writing Partner', category: 'Creativity', icon: 'img/default.svg', description: 'Helps brainstorm plots, characters, and dialogue for stories.', examples: ['"Help me brainstorm a sci-fi plot twist"', '"Write a short poem about the ocean"'] }, { id: 5, name: 'Automated Content Summarizer', category: 'Productivity', icon: 'img/default.svg', description: 'Distills long articles and reports into concise summaries.', examples: ['"Summarize the following article in 3 key points"', '"Give me the gist of this research paper"'] }, { id: 6, name: 'SQL Query Generator', category: 'Technical', icon: 'img/default.svg', description: 'Translates natural language questions into precise SQL queries.', examples: ['"Show me all users from California who signed up last week"', '"Count the number of orders over $50"'] }, { id: 7, name: 'Personalized Learning Tutor', category: 'Education', icon: 'img/default.svg', description: 'Creates custom lesson plans and quizzes on any subject.', examples: ['"Explain quantum physics to me like I\'m five"', '"Create a 5-question quiz on World War II"'] }, { id: 8, name: 'Investment Analysis Bot', category: 'Business', icon: 'img/default.svg', description: 'Provides insights and analysis on stocks and market opportunities.', examples: ['"What are the pros and cons of investing in AAPL?"', '"Compare the P/E ratio of Google and Microsoft"'] }, { id: 9, name: 'Meeting Assistant', category: 'Productivity', icon: 'img/default.svg', description: 'Transcribes meetings, identifies action items, and sends summaries.', examples: ['"Summarize our project kickoff meeting"', '"List all action items assigned to John"'] }];
        const botSuggestions = { '1': ['Suggest names for a coffee shop', 'Create a mission statement'], '2': ['Refactor this Python function', 'Check my JavaScript for errors'], '3': ['Upcoming trends in renewable energy?', 'Analyze sentiment for stock XYZ']};

        const urlParams = new URLSearchParams(window.location.search);
        let currentChatId = urlParams.get('chatId');
        const newChatBotId = urlParams.get('bot');
        const newChatBotName = urlParams.get('name');

        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('userInput');
        const sendMessageBtn = document.getElementById('sendMessageBtn');
        const historyList = document.getElementById('history-list');
        const chatTitle = document.getElementById('chat-title');
        const renameBtn = document.getElementById('rename-chat-btn');
        const deleteBtn = document.getElementById('delete-chat-btn');
        const welcomeMat = document.getElementById('welcome-mat');
        const suggestionChipsContainer = document.getElementById('suggestion-chips');

        let allChats = JSON.parse(localStorage.getItem('allChats')) || {};
        let currentBot = null;
        
        function initializeChat() {
            if (currentChatId) {
                loadChat(currentChatId);
            } else if (newChatBotId) {
                startNewChat(newChatBotId, newChatBotName);
            } else {
                displayWelcomeMat();
            }
            renderHistoryList();
        }
        
        function displayWelcomeMat() {
            welcomeMat.style.display = 'flex';
            userInput.disabled = true;
            sendMessageBtn.disabled = true;
            chatTitle.textContent = 'Select a Bot';
            welcomeMat.innerHTML = `
                <div class="welcome-content">
                    <div class="welcome-icon">👋</div>
                    <h2>Start a Conversation</h2>
                    <p>Select a conversation from your history or <a href="index.html">explore agents</a> to begin a new chat.</p>
                </div>
            `;
        }

        function loadChat(chatId) {
            const chat = allChats[chatId];
            if (!chat) {
                displayWelcomeMat();
                return;
            }
            currentChatId = chatId;
            currentBot = chatbotData.find(b => b.id == chat.botId);
            chatTitle.textContent = chat.title;
            chatWindow.innerHTML = '';
            chat.messages.forEach(msg => addMessage(msg.text, msg.sender, true));
            userInput.disabled = false;
            sendMessageBtn.disabled = false;
            welcomeMat.style.display = 'none';
            renderSuggestionChips();
        }
        
        function startNewChat(botId, botName) {
            currentChatId = Date.now().toString();
            currentBot = chatbotData.find(b => b.id == botId);
            const newChat = {
                botId: botId,
                title: `Chat with ${botName}`,
                messages: [],
                lastUpdated: Date.now()
            };
            allChats[currentChatId] = newChat;
            saveChats();
            window.history.replaceState({}, '', `chatbot.html?chatId=${currentChatId}`);
            loadChat(currentChatId);
        }

        function addMessage(text, sender, isLoading = false) {
            const messageWrapper = document.createElement('div');
            messageWrapper.className = 'message-wrapper';
            if (!isLoading) {
                messageWrapper.style.animation = 'slideInUp 0.4s ease-out';
            }
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}-message`;
            const p = document.createElement('p');
            p.textContent = text;
            messageDiv.appendChild(p);
            messageWrapper.appendChild(messageDiv);
            chatWindow.appendChild(messageWrapper);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function handleSend() {
            const userText = userInput.value.trim();
            if (userText && currentChatId) {
                const userMessage = { sender: 'user', text: userText };
                allChats[currentChatId].messages.push(userMessage);
                addMessage(userMessage.text, userMessage.sender);
                
                setTimeout(() => {
                    const botResponse = { sender: 'bot', text: 'This is a simulated response from the backend.' };
                    allChats[currentChatId].messages.push(botResponse);
                    allChats[currentChatId].lastUpdated = Date.now();
                    saveChats();
                    addMessage(botResponse.text, botResponse.sender);
                    renderHistoryList();
                }, 1200);

                userInput.value = '';
                suggestionChipsContainer.innerHTML = '';
            }
        }
        
        function renderHistoryList() {
            historyList.innerHTML = '';
            const chatIds = Object.keys(allChats);
            chatIds.sort((a, b) => allChats[b].lastUpdated - allChats[a].lastUpdated);
            
            if (chatIds.length === 0) {
                 historyList.innerHTML = `<p class="placeholder-text">Your conversations will appear here.</p>`;
                 return;
            }

            chatIds.forEach(chatId => {
                const chat = allChats[chatId];
                const bot = chatbotData.find(b => b.id == chat.botId);
                const item = document.createElement('a');
                item.href = `chatbot.html?chatId=${chatId}`;
                item.className = `history-item ${chatId === currentChatId ? 'active' : ''}`;
                item.innerHTML = `
                    <img src="${bot ? bot.icon : 'img/default.svg'}" class="history-icon" alt="">
                    <span class="history-title">${chat.title}</span>
                `;
                historyList.appendChild(item);
            });
        }
        
        function renderSuggestionChips() {
            if (!currentBot) return;
            const suggestions = botSuggestions[currentBot.id.toString()];
            if (!suggestions || allChats[currentChatId].messages.length > 0) {
                suggestionChipsContainer.innerHTML = '';
                return;
            }
            suggestionChipsContainer.innerHTML = suggestions.map(s => `<button class="chip">${s}</button>`).join('');
        }

        function saveChats() {
            localStorage.setItem('allChats', JSON.stringify(allChats));
        }

        renameBtn.addEventListener('click', () => {
            if (!currentChatId) return;
            const newTitle = prompt('Enter a new name for this conversation:', chatTitle.textContent);
            if (newTitle && newTitle.trim() !== '') {
                allChats[currentChatId].title = newTitle.trim();
                chatTitle.textContent = newTitle.trim();
                saveChats();
                renderHistoryList();
            }
        });

        deleteBtn.addEventListener('click', () => {
            if (!currentChatId || !confirm('Are you sure you want to delete this conversation?')) return;
            delete allChats[currentChatId];
            saveChats();
            window.location.href = 'chatbot.html';
        });

        sendMessageBtn.addEventListener('click', handleSend);
        userInput.addEventListener('keypress', (e) => e.key === 'Enter' && handleSend());
        suggestionChipsContainer.addEventListener('click', e => {
            if(e.target.classList.contains('chip')) {
                userInput.value = e.target.textContent.replace(/['"]+/g, '');
                handleSend();
            }
        });
        
        const themeToggle = document.getElementById('theme-toggle');
        const currentTheme = localStorage.getItem('theme');
        if (currentTheme) document.body.classList.add(currentTheme);
        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
            let theme = document.body.classList.contains('dark-mode') ? 'dark-mode' : 'light-mode';
            localStorage.setItem('theme', theme);
        });

        initializeChat();
    </script>
</body>
</html>
